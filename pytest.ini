[pytest]
pythonpath = .
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
markers =
    unit: fast isolated unit tests
    integration: tests that compose modules, filesystem, or local servers
    e2e: end-to-end or subprocess-style tests
addopts =
    --cov=bot
    --cov-config=.coveragerc
    --cov-report=term-missing:skip-covered
