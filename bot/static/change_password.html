<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change password — Nothing Ever Happens</title>
<style>
:root {
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --bg: #0f172a;
  --bg-card: #1e293b;
  --text: #e2e8f0;
  --text-muted: #94a3b8;
  --border: #334155;
  --danger: #dc2626;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}
.header {
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: 1rem 2rem;
}
.header-content { max-width: 1200px; margin: 0 auto; }
.site-title { font-size: 1.25rem; font-weight: 700; }
.site-subtitle { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }
.container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
.info-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
}
.mb-2 { margin-bottom: 1.5rem; }
.btn {
  display: inline-block;
  padding: 0.5rem 1rem;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 0.875rem;
  cursor: pointer;
  text-decoration: none;
}
.btn:hover { background: var(--primary-dark); }
.btn-secondary {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
}
input[type="password"] {
  width: 100%;
  max-width: 28rem;
  padding: 0.5rem 0.75rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 0.875rem;
}
label { display: block; margin-bottom: 0.25rem; font-size: 0.875rem; margin-top: 0.75rem; }
label:first-of-type { margin-top: 0; }
.flex { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
.nav-wrap { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
.admin-nav { justify-content: space-between; margin-bottom: 2rem; }
.error { color: var(--danger); margin-bottom: 1rem; }
.muted { color: var(--text-muted); font-size: 0.875rem; }
h1 { font-size: 1.5rem; }
</style>
</head>
<body>
<header class="header">
  <div class="header-content">
    <h1 class="site-title">Nothing Ever Happens</h1>
    <p class="site-subtitle">Dashboard — admin</p>
  </div>
</header>
<div class="container">
  <main class="main-content">
    <div class="flex admin-nav">
      <h1>Change password</h1>
      <div class="nav-wrap">
        <a href="/" class="btn btn-secondary">Dashboard</a>
        <a href="/admin/users" class="btn btn-secondary">Users</a>
        <form method="POST" action="/logout" style="display:inline;">
          <input type="hidden" name="csrf_token" value="{{CSRF_TOKEN}}">
          <button type="submit" class="btn btn-secondary">Logout</button>
        </form>
      </div>
    </div>
    {{MESSAGE}}
    {{ERROR}}
    <div class="info-box" style="max-width: 28rem;">
      <form method="POST" action="/admin/change-password">
        <input type="hidden" name="csrf_token" value="{{CSRF_TOKEN}}">
        <label for="current">Current password</label>
        <input type="password" id="current" name="current_password" required autocomplete="current-password">
        <label for="new1">New password</label>
        <input type="password" id="new1" name="new_password" required minlength="8" autocomplete="new-password">
        <label for="new2">Confirm new password</label>
        <input type="password" id="new2" name="new_password_confirm" required minlength="8" autocomplete="new-password">
        <p class="muted" style="margin-top:0.75rem;">At least 8 characters.</p>
        <button type="submit" class="btn" style="margin-top: 1rem;">Update password</button>
      </form>
    </div>
  </main>
</div>
</body>
</html>
